name: CD – Deploy to Azure

# Triggered manually or after CI passes on main.
# Configure the secrets below in GitHub → Settings → Secrets and variables → Actions.
on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build frontend first ────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy frontend into backend static resources
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/* backend/src/main/resources/static/

      # ── Build backend JAR (now includes frontend) ───────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package backend
        working-directory: backend
        run: ./mvnw package -DskipTests -q

      # ── Deploy to Azure ─────────────────────────────────────────────────────
      # Required secrets (GitHub → Settings → Secrets and variables → Actions):
      #   AZURE_WEBAPP_NAME             – App Service name from Azure portal
      #   AZURE_WEBAPP_PUBLISH_PROFILE  – download from App Service → Get publish profile
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/target/*.jar