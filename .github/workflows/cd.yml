name: CD – Deploy to Azure

# Triggered manually or after CI passes on main.
# Configure the secrets below in GitHub → Settings → Secrets and variables → Actions.
on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Build backend JAR ───────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Package backend
        working-directory: backend
        run: ./mvnw package -DskipTests -q

      # ── Build frontend ──────────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        run: npm ci && npm run build

      # ── Deploy to Azure ─────────────────────────────────────────────────────
      # TODO: configure Azure credentials and resource names before enabling.
      # Required secrets:
      #   AZURE_WEBAPP_PUBLISH_PROFILE  – download from Azure portal → App Service → Get publish profile
      #   AZURE_WEBAPP_NAME             – your App Service name (e.g. project-pulse-api)
      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/target/*.jar
