# ── Dev profile: H2 in-memory database (no PostgreSQL required) ───────────────
# Run with: ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev

spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# H2 web console — http://localhost:8080/h2-console (JDBC URL: above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable mail in dev (logs instead of sending)
spring.mail.host=localhost
spring.mail.port=3025
