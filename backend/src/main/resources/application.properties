spring.application.name=projectpulse

# ── Active profile ────────────────────────────────────────────────────────────
# Defaults to "dev" (H2 in-memory) so the app starts without any setup.
# Override with env var SPRING_PROFILES_ACTIVE=prod before deploying to Azure.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# Override these in application-local.properties (git-ignored) or via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/projectpulse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Use "create-drop" in dev to auto-generate the schema, "validate" in prod.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED: replace with a real 256-bit Base64-encoded secret before deploying.
jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLXVzZS1hLXJlYWwtMjU2LWJpdC1iYXNlNjQtc2VjcmV0LWtleS0h}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
# Use an App Password, not your regular Gmail password.
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# The "From" address shown in invitation emails
app.mail.from=${MAIL_USERNAME:noreply@projectpulse.app}
# Base URL used to build invitation links (no trailing slash)
app.base-url=${APP_BASE_URL:http://localhost:3000}
# Invitation token expiry in hours
app.invitation.expiry-hours=72

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
