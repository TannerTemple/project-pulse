spring.application.name=projectpulse

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
# Override these in application-local.properties (git-ignored) or via env vars.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/projectpulse}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Use "create-drop" in dev to auto-generate the schema, "validate" in prod.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# REQUIRED: replace with a real 256-bit Base64-encoded secret before deploying.
jwt.secret=${JWT_SECRET:Y2hhbmdlLW1lLXVzZS1hLXJlYWwtMjU2LWJpdC1iYXNlNjQtc2VjcmV0LWtleS0h}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
