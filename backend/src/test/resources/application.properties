# Test profile — uses H2 in-memory so CI runs without a real PostgreSQL instance.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Dummy JWT secret for tests (Base64 of a 32-byte key)
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3RpbmctcHVycG9zZXMtb25seQ==
jwt.expiration-ms=3600000

# Disable mail sending in tests
spring.mail.host=localhost
spring.mail.port=3025
